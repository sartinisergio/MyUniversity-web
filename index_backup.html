<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyUniversity — Ricerca Insegnamenti</title>
  <script src="https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/dist/duckdb-browser-mvp.worker.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/dist/duckdb-browser-mvp.js" type="module"></script>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
    header {
      background: #c8102e;
      color: white;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header span { font-size: 0.9rem; opacity: 0.85; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }
    .filtri {
      background: white;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .filtri h2 { font-size: 1rem; color: #c8102e; margin-bottom: 16px; }
    .filtri-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .filtro-gruppo label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #666;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .filtro-gruppo select,
    .filtro-gruppo input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      background: #fafafa;
    }
    .filtro-gruppo select:focus,
    .filtro-gruppo input:focus {
      outline: none;
      border-color: #c8102e;
      background: white;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      padding: 9px 22px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }
    #btn-cerca { background: #c8102e; color: white; }
    #btn-reset { background: #eee; color: #555; }
    #btn-cerca:hover { background: #a50d26; }
    #btn-reset:hover { background: #ddd; }
    .risultati {
      background: white;
      border-radius: 10px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .risultati-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    #contatore {
      font-size: 0.9rem;
      color: #666;
    }
    #contatore strong { color: #c8102e; }
    #status {
      font-size: 0.85rem;
      color: #999;
      font-style: italic;
    }
    table#tabella {
      width: 100% !important;
      font-size: 0.85rem;
    }
    table#tabella thead th {
      background: #f0f0f0;
      color: #444;
      font-weight: 600;
      white-space: nowrap;
    }
    table#tabella tbody tr:hover { background: #fff8f8; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-triennale { background: #e3f0ff; color: #1a5fa8; }
    .badge-magistrale { background: #fff3e0; color: #e65100; }
    .badge-ciclo_unico { background: #e8f5e9; color: #2e7d32; }
    a.link-ins {
      color: #c8102e;
      text-decoration: none;
      font-size: 0.8rem;
    }
    a.link-ins:hover { text-decoration: underline; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🎓 MyUniversity — Ricerca Insegnamenti</h1>
    <span>Anno accademico 2022/2023 · Fonte: MUR · Zanichelli uso interno</span>
  </div>
</header>

<div class="container">

  <div class="filtri">
    <h2>🔍 Filtri di ricerca</h2>
    <div class="filtri-grid">

      <div class="filtro-gruppo">
        <label>Cerca insegnamento</label>
        <input type="text" id="f-insegnamento" placeholder="es. analisi matematica...">
      </div>

      <div class="filtro-gruppo">
        <label>Area SSD</label>
        <select id="f-area">
          <option value="">— Tutte le aree —</option>
        </select>
      </div>

      <div class="filtro-gruppo">
        <label>Codice SSD</label>
        <select id="f-ssd">
          <option value="">— Tutti i codici —</option>
        </select>
      </div>

      <div class="filtro-gruppo">
        <label>Zona geografica</label>
        <select id="f-zona">
          <option value="">— Tutte le zone —</option>
        </select>
      </div>

      <div class="filtro-gruppo">
        <label>Regione</label>
        <select id="f-regione">
          <option value="">— Tutte le regioni —</option>
        </select>
      </div>

      <div class="filtro-gruppo">
        <label>Ateneo</label>
        <select id="f-ateneo">
          <option value="">— Tutti gli atenei —</option>
        </select>
      </div>

      <div class="filtro-gruppo">
        <label>Tipologia corso</label>
        <select id="f-tipologia">
          <option value="">— Tutte —</option>
        </select>
      </div>

      <div class="filtro-gruppo">
        <label>Classe di laurea</label>
        <select id="f-classe">
          <option value="">— Tutte le classi —</option>
        </select>
      </div>

      <div class="filtro-gruppo">
        <label>Anno di corso</label>
        <select id="f-anno">
          <option value="">— Tutti —</option>
          <option value="1">1° anno</option>
          <option value="2">2° anno</option>
          <option value="3">3° anno</option>
          <option value="4">4° anno</option>
          <option value="5">5° anno</option>
          <option value="6">6° anno</option>
        </select>
      </div>

    </div>
    <div class="btn-row">
      <button id="btn-cerca">🔍 Cerca</button>
      <button id="btn-reset">↺ Reset</button>
    </div>
  </div>

  <div class="risultati">
    <div class="risultati-header">
      <div id="contatore">Inserisci i filtri e premi Cerca</div>
      <div id="status">Caricamento dati in corso...</div>
    </div>
    <div id="tabella-container">
      <div class="loading">⏳ Inizializzazione motore di ricerca...</div>
    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script type="module">
  import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/+esm';

  let db, conn;

  // ── Inizializzazione DuckDB ──────────────────────────────
  async function initDuckDB() {
    const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();
    const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);
    const worker_url = URL.createObjectURL(
      new Blob([`importScripts("${bundle.mainWorker}");`],
      { type: 'text/javascript' })
    );
    const worker = new Worker(worker_url);
    const logger = new duckdb.ConsoleLogger();
    db = new duckdb.AsyncDuckDB(logger, worker);
    await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
    conn = await db.connect();
    document.getElementById('status').textContent = 'Caricamento CSV...';
    await caricaCSV();
  }

  // ── Caricamento CSV ──────────────────────────────────────
  async function caricaCSV() {
    // Carica insegnamenti
    const respIns = await fetch('insegnamenti.csv');
    const csvIns  = await respIns.text();
    await db.registerFileText('insegnamenti.csv', csvIns);

    // Carica lauree
    const respLau = await fetch('lauree.csv');
    const csvLau  = await respLau.text();
    await db.registerFileText('lauree.csv', csvLau);

    // Crea tabelle
    await conn.query(`
      CREATE TABLE insegnamenti AS
      SELECT * FROM read_csv_auto('insegnamenti.csv', header=true, ignore_errors=true);
    `);
    await conn.query(`
      CREATE TABLE lauree AS
      SELECT * FROM read_csv_auto('lauree.csv', header=true, ignore_errors=true);
    `);

    document.getElementById('status').textContent = 'Pronto';
    document.getElementById('tabella-container').innerHTML =
      '<table id="tabella" class="display" style="width:100%"></table>';

    await popolaFiltri();
    inizializzaTabella();
  }

  // ── Popola i dropdown dai dati reali ────────────────────
  async function popolaFiltri() {
    const query = (col, tabella) =>
      conn.query(`SELECT DISTINCT ${col} FROM ${tabella}
                  WHERE ${col} IS NOT NULL
                  ORDER BY ${col}`);

    const fill = async (selectId, col, tabella) => {
      const res = await query(col, tabella);
      const sel = document.getElementById(selectId);
      res.toArray().forEach(r => {
        const v = String(Object.values(r)[0]);
        if (v && v !== 'null') {
          const opt = document.createElement('option');
          opt.value = v; opt.textContent = v;
          sel.appendChild(opt);
        }
      });
    };

    // Estrai area SSD dal codice (es. BIO da BIO/09)
    const aree = await conn.query(`
      SELECT DISTINCT regexp_extract(ssd, '^([A-Z]+)/', 1) AS area
      FROM insegnamenti
      WHERE ssd IS NOT NULL AND ssd != ''
      ORDER BY area
    `);
    const selArea = document.getElementById('f-area');
    aree.toArray().forEach(r => {
      const v = String(r.area);
      if (v && v !== 'null' && v !== '') {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        selArea.appendChild(opt);
      }
    });

    // Estrai codice SSD (es. BIO/09)
    const ssdCodici = await conn.query(`
      SELECT DISTINCT regexp_extract(ssd, '^([^ ]+)', 1) AS codice
      FROM insegnamenti
      WHERE ssd IS NOT NULL AND ssd != ''
      ORDER BY codice
    `);
    const selSsd = document.getElementById('f-ssd');
    ssdCodici.toArray().forEach(r => {
      const v = String(r.codice);
      if (v && v !== 'null' && v !== '') {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        selSsd.appendChild(opt);
      }
    });

    await fill('f-zona',      'zona',        'insegnamenti');
    await fill('f-regione',   'regione',      'insegnamenti');
    await fill('f-ateneo',    'ateneo',       'insegnamenti');
    await fill('f-tipologia', 'tipologia',    'insegnamenti');
    // Carica lookup classi
const rispLookup = await fetch('classi_lookup.json');
const lookup = await rispLookup.json();

// Popola dropdown classi ordinato per codice ministeriale
const classiRes = await conn.query(`
  SELECT DISTINCT nome_classe FROM insegnamenti
  WHERE nome_classe IS NOT NULL
`);

// Funzione per ordinare i codici ministeriali
function ordinaCodice(codice) {
  if (!codice) return 'ZZZ';
  // L- prima di LM- prima di LMG- ecc.
  const prefissi = {'L-': '1', 'L/': '2', 'LM-': '3', 'LM/': '4', 'LMG': '5', 'LMR': '6'};
  let prefisso = '9';
  for (const [p, v] of Object.entries(prefissi)) {
    if (codice.startsWith(p)) { prefisso = v; break; }
  }
  // Estrai numero per ordinamento numerico corretto
  const num = parseInt(codice.replace(/[^0-9]/g, '')) || 999;
  return prefisso + String(num).padStart(4, '0');
}

const selClasse = document.getElementById('f-classe');
const voci = [];

classiRes.toArray().forEach(r => {
  const nome = String(r.nome_classe);
  if (nome && nome !== 'null') {
    const codice = lookup[nome.toLowerCase()] || '';
    voci.push({ nome, codice, sort: ordinaCodice(codice) });
  }
});

// Ordina per codice
voci.sort((a, b) => a.sort.localeCompare(b.sort));

voci.forEach(({ nome, codice }) => {
  const opt = document.createElement('option');
  opt.value = nome;
  opt.textContent = codice ? `${codice} · ${nome}` : nome;
  selClasse.appendChild(opt);
});
  }

  // ── Costruisce la WHERE clause dai filtri ────────────────
  function buildWhere() {
    const clauses = [];

    const ins = document.getElementById('f-insegnamento').value.trim();
    if (ins) clauses.push(
      `lower(i.insegnamento) LIKE '%${ins.toLowerCase().replace(/'/g,"''")}%'`
    );

    const area = document.getElementById('f-area').value;
    if (area) clauses.push(
      `regexp_extract(i.ssd, '^([A-Z]+)/', 1) = '${area}'`
    );

    const ssd = document.getElementById('f-ssd').value;
    if (ssd) clauses.push(
      `regexp_extract(i.ssd, '^([^ ]+)', 1) = '${ssd}'`
    );

    const zona = document.getElementById('f-zona').value;
    if (zona) clauses.push(`i.zona = '${zona.replace(/'/g,"''")}'`);

    const reg = document.getElementById('f-regione').value;
    if (reg) clauses.push(`i.regione = '${reg.replace(/'/g,"''")}'`);

    const ate = document.getElementById('f-ateneo').value;
    if (ate) clauses.push(`i.ateneo = '${ate.replace(/'/g,"''")}'`);

    const tip = document.getElementById('f-tipologia').value;
    if (tip) clauses.push(`i.tipologia = '${tip.replace(/'/g,"''")}'`);

    const cls = document.getElementById('f-classe').value;
    if (cls) clauses.push(`i.nome_classe = '${cls.replace(/'/g,"''")}'`);

    const anno = document.getElementById('f-anno').value;
    if (anno) clauses.push(`i.anno_ins = ${anno}`);

    return clauses.length ? 'WHERE ' + clauses.join(' AND ') : '';
  }

  // ── DataTable ────────────────────────────────────────────
  let dtTable = null;

  function inizializzaTabella() {
    dtTable = $('#tabella').DataTable({
      data: [],
      columns: [
        { title: 'Insegnamento',   data: 'insegnamento' },
        { title: 'SSD',            data: 'ssd' },
        { title: 'Ateneo',         data: 'ateneo' },
        { title: 'Laurea',         data: 'laurea' },
        { title: 'Tipologia',      data: 'tipologia',
          render: v => `<span class="badge badge-${v}">${v}</span>` },
        { title: 'A.',             data: 'anno_ins' },
        { title: 'CFU',            data: 'cfu' },
        { title: 'Curriculum',     data: 'n_curriculum',
          render: (v, _, row) =>
            v > 1 ? `${v} (${row.curriculum_lista})` : row.curriculum_lista },
        { title: 'Link',           data: 'url_ins',
          render: v => v && v !== 'NA' && v !== 'null'
            ? `<a class="link-ins" href="${v}" target="_blank">🔗</a>` : '' }
      ],
      pageLength: 25,
      language: {
        url: 'https://cdn.datatables.net/plug-ins/1.13.6/i18n/it-IT.json'
      },
      dom: 'rtip',
      searching: false
    });
  }

  // ── Esegui la ricerca ────────────────────────────────────
  async function eseguiRicerca() {
    if (!conn) return;
    document.getElementById('status').textContent = 'Ricerca in corso...';

    const where = buildWhere();

    const sql = `
      SELECT
        i.insegnamento,
        i.ssd,
        i.ateneo,
        i.regione,
        i.zona,
        i.laurea,
        i.nome_classe,
        i.tipologia,
        i.durata,
        CAST(i.anno_ins AS VARCHAR) AS anno_ins,
        CAST(i.cfu AS VARCHAR) AS cfu,
        CAST(i.n_curriculum AS VARCHAR) AS n_curriculum,
        COALESCE(i.curriculum_lista, '') AS curriculum_lista,
        i.trasversale,
        COALESCE(i.url_ins, '') AS url_ins
      FROM insegnamenti i
      ${where}
      ORDER BY i.ateneo, i.laurea, i.insegnamento
      LIMIT 5000
    `;

    try {
      const result = await conn.query(sql);
      const rows   = result.toArray().map(r => {
        const obj = {};
        Object.keys(r).forEach(k => obj[k] = r[k] === null ? '' : String(r[k]));
        return obj;
      });

      dtTable.clear().rows.add(rows).draw();

      const totSql = `SELECT COUNT(*) AS n FROM insegnamenti i ${where}`;
      const totRes = await conn.query(totSql);
      const tot    = totRes.toArray()[0].n;

      document.getElementById('contatore').innerHTML =
        `<strong>${tot.toLocaleString('it-IT')}</strong> insegnamenti trovati` +
        (tot > 5000 ? ' (visualizzati i primi 5.000)' : '');
      document.getElementById('status').textContent = 'Pronto';
    } catch(e) {
      console.error(e);
      document.getElementById('status').textContent = 'Errore nella query';
    }
  }

  // ── Event listeners ──────────────────────────────────────
  document.getElementById('btn-cerca').addEventListener('click', eseguiRicerca);

  document.getElementById('btn-reset').addEventListener('click', () => {
    ['f-insegnamento','f-area','f-ssd','f-zona',
     'f-regione','f-ateneo','f-tipologia','f-classe','f-anno']
      .forEach(id => {
        const el = document.getElementById(id);
        el.tagName === 'SELECT' ? el.value = '' : el.value = '';
      });
    dtTable.clear().draw();
    document.getElementById('contatore').textContent =
      'Inserisci i filtri e premi Cerca';
  });

  document.getElementById('f-insegnamento')
    .addEventListener('keydown', e => {
      if (e.key === 'Enter') eseguiRicerca();
    });

  // ── Avvio ────────────────────────────────────────────────
  initDuckDB().catch(err => {
    console.error(err);
    document.getElementById('status').textContent = 'Errore caricamento';
    document.getElementById('tabella-container').innerHTML =
      '<p style="color:red;padding:20px">Errore nel caricamento dei dati. ' +
      'Assicurati che i file CSV siano nella stessa cartella di index.html.</p>';
  });
</script>

</body>
</html>
